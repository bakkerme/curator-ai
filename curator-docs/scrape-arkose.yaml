workflow:
  name: "Arkose Labs Scrape Test"
  version: "1.0"

  trigger:
    - cron:
        schedule: "0 0 * * *"
        timezone: "UTC"

  sources:
    - scrape:
        urls:
          - https://www.arkoselabs.com/blog/
        post_limit: 15 
        lookback: "365d"
        discovery:
          # Verified with Playwright on 2026-03-01. The listing page renders
          # blog cards as links inside article.blog-card containers.
          item_selector: "article.blog-card a.blog-card__link"
          # The visible pagination on this page is rendered as non-link controls,
          # so we intentionally keep this to a single page crawl for now.
          max_pages: 1
        extraction:
          # Verified against a live Arkose Labs blog post page.
          title_selector: "article.h-entry h1.p-name"
          author_selector: "article.h-entry .author-name a.p-author"
          date_selector: "article.h-entry .entry-meta time.dt-published"
          date_attr: "datetime"
          content_selector: "article.h-entry .e-content"
        markdown:
          enabled: true
        request:
          user_agent: "curator-ai/0.1"
        snapshot:
          # snapshot: true
          restore: true
          path: "snapshots/arkose-scrape-source.json"

  output:
    - email:
        template: |-
          {{range .Blocks}}
          ## {{.Title}}
          URL: {{.URL}}
          Author: {{.Author}}
          Published: {{.CreatedAt}}

          {{.Summary}}

          {{end}}
        to: brandon@bdmd.com.au
        subject: "Arkose Labs Scrape Test"
